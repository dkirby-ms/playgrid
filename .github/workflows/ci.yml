name: CI

on:
  pull_request:
    branches:
      - dev
    paths-ignore:
      - docs/**
      - .squad/**
      - '*.md'
      - '**/*.md'
  push:
    branches:
      - dev
    paths-ignore:
      - docs/**
      - .squad/**
      - '*.md'
      - '**/*.md'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspaces
        run: npm run build

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

  version-bump:
    if: github.event_name == 'push'
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4
        with:
          node-version: 22
          cache: npm

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: version
        run: |
          set -euo pipefail

          npm version patch --no-git-tag-version
          NEW_VERSION="$(node -p "require('./package.json').version")"

          npm pkg set version="$NEW_VERSION" --workspace client --workspace server --workspace shared
          npm install --package-lock-only --ignore-scripts --legacy-peer-deps

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          set -euo pipefail

          git add package.json package-lock.json client/package.json server/package.json shared/package.json
          git commit -m "chore: bump patch version to v${{ steps.version.outputs.new_version }} [skip ci]"

      - name: Push version bump
        run: git push origin HEAD:dev
