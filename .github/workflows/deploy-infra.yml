name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
      postgres_admin_password:
        description: 'PostgreSQL admin password (leave empty to use existing)'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-infra-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Azure login via OIDC
        uses: azure/login@6c251865b4e6290e7b78be643ea2d005bc51f69a # v2.1.1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep template
        run: |
          az bicep build --file infra/main.bicep
          echo "✓ Bicep syntax valid"

      - name: Run what-if deployment
        run: |
          POSTGRES_PASSWORD="${{ inputs.postgres_admin_password }}"
          if [ -z "$POSTGRES_PASSWORD" ]; then
            echo "No password provided, skipping what-if (requires password parameter)"
            exit 0
          fi
          
          az deployment group what-if \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters environmentName=${{ inputs.environment }} \
            --parameters postgresAdminPassword="$POSTGRES_PASSWORD"

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Azure login via OIDC
        uses: azure/login@6c251865b4e6290e7b78be643ea2d005bc51f69a # v2.1.1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate password input
        run: |
          POSTGRES_PASSWORD="${{ inputs.postgres_admin_password }}"
          if [ -z "$POSTGRES_PASSWORD" ]; then
            echo "❌ PostgreSQL password is required for infrastructure deployment"
            echo "Please provide postgres_admin_password input when triggering workflow"
            exit 1
          fi

      - name: Deploy infrastructure
        run: |
          az deployment group create \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters environmentName=${{ inputs.environment }} \
            --parameters postgresAdminPassword="${{ inputs.postgres_admin_password }}" \
            --output json \
            > deployment-output.json
          
          echo "✓ Infrastructure deployed successfully"

      - name: Display outputs
        run: |
          echo "📋 Deployment Outputs:"
          echo "====================="
          cat deployment-output.json | jq -r '.properties.outputs | to_entries[] | "\(.key): \(.value.value)"'

      - name: Save outputs for GitHub Actions
        run: |
          echo "🔑 Configure these as GitHub Actions variables for the '${{ inputs.environment }}' environment:"
          echo ""
          echo "ACR_NAME=$(cat deployment-output.json | jq -r '.properties.outputs.acrName.value')"
          echo "CONTAINER_APP_NAME=$(cat deployment-output.json | jq -r '.properties.outputs.containerAppName.value')"
          echo "CONTAINER_APP_FQDN=$(cat deployment-output.json | jq -r '.properties.outputs.containerAppFqdn.value')"
          echo "RESOURCE_GROUP=${{ vars.RESOURCE_GROUP }}"
          echo ""
          echo "💡 To set these variables, go to:"
          echo "   Settings → Environments → ${{ inputs.environment }} → Environment variables"

      - name: Notify Discord on success
        if: success()
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "✅ Infrastructure Deploy Success",
                "description": "PlayGrid '\''${{ inputs.environment }}'\'' infrastructure deployed successfully",
                "color": 3066993,
                "fields": [
                  {
                    "name": "Environment",
                    "value": "${{ inputs.environment }}",
                    "inline": true
                  },
                  {
                    "name": "Resource Group",
                    "value": "${{ vars.RESOURCE_GROUP }}",
                    "inline": true
                  },
                  {
                    "name": "Triggered By",
                    "value": "${{ github.actor }}",
                    "inline": true
                  }
                ],
                "timestamp": "'\''$(date -u +%Y-%m-%dT%H:%M:%S.000Z)'\''"
              }]
            }'

      - name: Notify Discord on failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "❌ Infrastructure Deploy Failed",
                "description": "PlayGrid '\''${{ inputs.environment }}'\'' infrastructure deployment failed",
                "color": 15158332,
                "fields": [
                  {
                    "name": "Environment",
                    "value": "${{ inputs.environment }}",
                    "inline": true
                  },
                  {
                    "name": "Triggered By",
                    "value": "${{ github.actor }}",
                    "inline": true
                  },
                  {
                    "name": "Workflow Run",
                    "value": "[View logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})",
                    "inline": true
                  }
                ],
                "timestamp": "'\''$(date -u +%Y-%m-%dT%H:%M:%S.000Z)'\''"
              }]
            }'
