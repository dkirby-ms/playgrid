name: Deploy Prod

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Azure login via OIDC
        uses: azure/login@6c251865b4e6290e7b78be643ea2d005bc51f69a # v2.1.1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry ${{ vars.ACR_NAME }} \
            --image playgrid:${{ github.sha }} \
            --image playgrid:latest \
            --file Dockerfile \
            .

      - name: Configure container app registry
        run: |
          az containerapp registry set \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --server ${{ vars.ACR_NAME }}.azurecr.io \
            --identity system

      - name: Configure container app secrets
        run: |
          KEY_VAULT_URI="${{ vars.KEY_VAULT_URI }}"
          KEY_VAULT_URI="${KEY_VAULT_URI%/}"
          az containerapp secret set \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --secrets "postgres-connection-string=keyvaultref:${KEY_VAULT_URI}/secrets/postgres-connection-string,identityref:system"

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ vars.ACR_NAME }}.azurecr.io/playgrid:${{ github.sha }} \
            --command "" \
            --args "" \
            --set-env-vars "NODE_ENV=production" "PORT=2567" "DATABASE_URL=secretref:postgres-connection-string"

      - name: Wait for deployment
        run: sleep 15

      - name: Health check
        run: |
          HEALTH_URL="${{ vars.CONTAINER_APP_FQDN }}/health"
          echo "Checking health endpoint: $HEALTH_URL"
          
          MAX_ATTEMPTS=10
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            if curl -f -s "$HEALTH_URL" | grep -q '"status":"ok"'; then
              echo "✓ Health check passed"
              exit 0
            fi
            ATTEMPT=$((ATTEMPT + 1))
            echo "Health check attempt $ATTEMPT/$MAX_ATTEMPTS failed, retrying in 5s..."
            sleep 5
          done
          
          echo "✗ Health check failed after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Notify Discord
        if: always()
        uses: ./.github/actions/discord-notify
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          environment: prod
          deployment-url: ${{ vars.CONTAINER_APP_FQDN }}
          commit-sha: ${{ github.sha }}
          author: ${{ github.actor }}
          repository: ${{ github.repository }}
          run-id: ${{ github.run_id }}
