name: ✨ Feature Request
description: Suggest a new feature or improvement
labels: ['enhancement']
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Let's hear it!

  - type: textarea
    id: feature_description
    attributes:
      label: Feature description
      description: What feature would you like to see?
      placeholder: |
        Example: Add a spectator mode so players can watch matches without joining.
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: Why is this important? What problem does it solve?
      placeholder: |
        This would let friends watch live matches and chat without cluttering the active player list.
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: Possible implementation
      description: Any ideas on how to build this? (optional)
      placeholder: Could add a "Watch" button in the lobby that joins as a read-only client.
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Nice to have
        - Important
        - Critical
    validations:
      required: false
