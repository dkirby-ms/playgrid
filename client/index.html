<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>Playgrid - Online Board Games</title>
    <link rel="stylesheet" href="/src/ui/design-tokens.css" />
    <style>
      :root {
        --game-sidebar-width: 304px;
        --game-sidebar-gap: 16px;
        --game-sidebar-edge-offset: 16px;
        --game-sidebar-layout-reserve: calc(
          var(--game-sidebar-width) +
          var(--game-sidebar-gap) +
          var(--game-sidebar-edge-offset)
        );
      }

      /* === Utility Classes === */
      .glass-panel {
        background: var(--glass-bg);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        border: 1px solid var(--glass-border);
        border-radius: var(--glass-radius);
      }

      .status-dot {
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 50%;
        display: inline-block;
      }

      .status-dot.online {
        background: var(--status-online);
      }

      .status-dot.ingame {
        background: var(--status-ingame);
      }

      .status-dot.away {
        background: var(--status-away);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: var(--font-family);
      }

      body {
        position: relative;
      }

      #app,
      #game-container {
        width: 100%;
        height: 100%;
      }

      #game-container {
        transition: width 220ms ease;
      }

      body.game-layout-sidebar-active #game-container {
        width: max(0px, calc(100% - var(--game-sidebar-layout-reserve)));
      }

      #game-container canvas {
        display: block;
      }

      @media (max-width: 767px) {
        body.game-layout-sidebar-active #game-container {
          width: 100%;
        }
      }

      /* Lobby Dashboard Styles */
      #lobby-overlay {
        position: fixed;
        inset: 0;
        display: none;
        z-index: 10;
        overflow-y: auto;
        background: var(--gradient-page);
      }

      #lobby-overlay.visible {
        display: block;
      }

      .lobby-dashboard {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: var(--gradient-page);
      }

      /* Header */
      .lobby-header {
        border-bottom: 1px solid var(--border-default);
        background: var(--glass-bg);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        position: sticky;
        top: 0;
        z-index: 20;
        height: 64px;
        display: flex;
        align-items: center;
      }

      .lobby-header-inner {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0 var(--space-lg);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex: 1;
        height: 100%;
      }

      .lobby-header-left {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .lobby-logo {
        width: 40px;
        height: 40px;
        border-radius: var(--radius-md);
        background: var(--gradient-button-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .lobby-logo svg {
        width: 24px;
        height: 24px;
        color: var(--text-primary);
      }

      .lobby-title-group {
        display: flex;
        flex-direction: column;
      }

      .lobby-title {
        font-size: var(--font-xl);
        color: var(--text-primary);
        font-weight: 600;
        line-height: 1.2;
      }

      .lobby-subtitle {
        font-size: var(--font-sm);
        color: var(--text-muted);
      }

      .lobby-header-right {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .lobby-header-button {
        padding: 0.5rem;
        border-radius: var(--radius-md);
        background: var(--bg-card);
        color: var(--text-muted);
        border: none;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .lobby-header-button:hover {
        background: var(--pg-slate-700);
        color: var(--text-primary);
      }

      .lobby-header-button svg {
        width: 20px;
        height: 20px;
      }

      .lobby-header-user {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        border-radius: var(--radius-md);
        background: var(--bg-card);
        color: var(--text-muted);
        border: none;
        cursor: pointer;
        transition: all 0.2s;
      }

      .lobby-header-user:hover {
        background: var(--pg-slate-700);
        color: var(--text-primary);
      }

      .lobby-header-user svg {
        width: 20px;
        height: 20px;
      }

      .lobby-header-user span {
        font-size: 0.875rem;
      }

      /* Main Content */
      .lobby-content {
        max-width: 1280px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
        flex: 1;
      }

      .lobby-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }

      @media (min-width: 1024px) {
        .lobby-grid {
          grid-template-columns: 1fr 360px;
        }
      }

      /* Game Library */
      .game-library {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .game-library-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 1rem;
      }

      .game-library-title {
        font-size: var(--font-2xl);
        color: var(--text-primary);
        font-weight: 600;
      }

      .game-library-toolbar {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .create-game-trigger {
        padding: 0.5rem 1rem;
        border-radius: var(--radius-md);
        background: var(--gradient-button-primary);
        color: var(--text-primary);
        border: none;
        cursor: pointer;
        font-weight: 600;
        font-size: var(--font-sm);
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .create-game-trigger:hover {
        transform: scale(1.02);
        filter: brightness(1.1);
      }

      .create-game-trigger svg {
        width: 16px;
        height: 16px;
      }

      /* Filter buttons */
      .lobby-filters {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .lobby-filter-button {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 0.875rem;
        border: 1px solid var(--border-default);
        border-radius: var(--radius-pill);
        background: transparent;
        color: var(--text-secondary);
        font: inherit;
        font-size: var(--font-sm);
        cursor: pointer;
        transition: all 0.2s;
      }

      .lobby-filter-button:hover {
        background: var(--accent-soft);
        border-color: var(--accent-primary);
      }

      .lobby-filter-button.active {
        background: var(--accent-soft);
        border-color: var(--accent-primary);
        color: var(--text-primary);
      }

      .filter-badge {
        min-width: 20px;
        height: 20px;
        padding: 0 6px;
        border-radius: var(--radius-pill);
        background: var(--bg-card-dark);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: var(--font-xs);
        font-weight: 600;
      }

      /* Game Tiles Grid */
      .game-tiles-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.5rem;
        padding: var(--space-xl);
      }

      @media (min-width: 640px) {
        .game-tiles-grid {
          grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        }
      }

      @media (min-width: 1024px) {
        .game-tiles-grid {
          grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        }
      }

      .game-tile {
        position: relative;
        overflow: hidden;
        border-radius: var(--glass-radius);
        background: var(--bg-card);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        border: 1px solid var(--border-light);
        cursor: pointer;
        transition: all 0.2s ease;
        padding: 0;
        text-align: left;
      }

      .game-tile:hover {
        transform: scale(1.05);
        box-shadow: var(--shadow-hover);
        border-color: var(--accent-border);
        background: var(--bg-card);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
      }

      .game-tile-image {
        aspect-ratio: 4/3;
        overflow: hidden;
        position: relative;
      }

      .game-tile-image::before {
        content: '';
        position: absolute;
        inset: 0;
        background: var(--gradient-tile-overlay);
        z-index: 1;
      }

      .game-tile:hover .game-tile-image-inner {
        transform: scale(1.1);
      }

      .game-tile-image-inner {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        transition: transform 0.3s;
      }

      .game-tile-content {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 1rem;
        z-index: 2;
      }

      .game-tile-name {
        font-size: var(--font-lg);
        color: var(--text-primary);
        font-weight: 600;
        margin-bottom: 0.5rem;
      }

      .game-tile-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: var(--font-sm);
      }

      .game-tile-players {
        display: flex;
        align-items: center;
        gap: 0.25rem;
        color: var(--text-secondary);
      }

      .game-tile-players svg {
        width: 16px;
        height: 16px;
      }

      .game-tile-active {
        color: var(--accent-highlight);
        font-weight: 500;
      }

      /* Sidebar */
      .lobby-sidebar {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      /* Active Games Panel */
      .active-games-panel,
      .online-players-panel {
        border-radius: var(--glass-radius);
        background: var(--glass-bg);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        border: 1px solid var(--glass-border);
        padding: var(--space-lg);
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1rem;
      }

      .panel-title {
        font-size: var(--font-lg);
        color: var(--text-primary);
        font-weight: 600;
      }

      .panel-badge {
        padding: 0.25rem 0.625rem;
        border-radius: var(--radius-pill);
        background: var(--accent-primary);
        color: var(--text-primary);
        font-size: var(--font-sm);
        font-weight: 600;
      }

      .panel-content {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .panel-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
        text-align: center;
        color: var(--text-muted);
        font-size: var(--font-sm);
      }

      /* Active Game Card */
      .active-game-card {
        border-radius: var(--radius-md);
        background: var(--glass-bg-strong);
        padding: 0.75rem;
        border: 1px solid var(--border-light);
        transition: all 0.2s;
      }

      .active-game-card:hover {
        border-color: var(--accent-border);
      }

      .active-game-info {
        flex: 1;
        min-width: 0;
      }

      .active-game-name {
        color: var(--text-primary);
        font-weight: 500;
        font-size: 0.9375rem;
        margin-bottom: 0.25rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .active-game-meta {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        color: var(--text-secondary);
        font-size: var(--font-xs);
      }

      .active-game-meta-item {
        display: flex;
        align-items: center;
        gap: 0.25rem;
      }

      .active-game-meta-item svg {
        width: 12px;
        height: 12px;
      }

      .game-status-badge {
        padding: 0.125rem 0.5rem;
        border-radius: var(--radius-pill);
        font-size: var(--font-xs);
        font-weight: 500;
        white-space: nowrap;
      }

      .game-status-badge.waiting {
        background: var(--status-waiting-bg);
        color: var(--status-waiting-text);
      }

      .game-status-badge.playing {
        background: var(--status-playing-bg);
        color: var(--status-playing-text);
      }

      .active-game-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }

      .active-game-players {
        display: flex;
        margin-left: -0.5rem;
      }

      .player-avatar {
        width: 24px;
        height: 24px;
        border-radius: var(--radius-pill);
        background: var(--gradient-button-primary);
        border: 2px solid var(--bg-dark);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: var(--font-xs);
        color: var(--text-primary);
        font-weight: 600;
      }

      .active-game-join-btn {
        display: flex;
        align-items: center;
        gap: 0.25rem;
        padding: 0.25rem 0.75rem;
        border-radius: var(--radius-sm);
        background: var(--accent-primary);
        color: var(--text-primary);
        border: none;
        cursor: pointer;
        font-size: var(--font-xs);
        font-weight: 600;
        transition: all 0.2s;
      }

      .active-game-join-btn:hover {
        background: var(--accent-primary-strong);
      }

      .active-game-join-btn svg {
        width: 12px;
        height: 12px;
      }

      /* Online Players Panel */
      .online-player-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.5rem;
        border-radius: var(--radius-md);
        background: var(--glass-bg-strong);
        border: 1px solid var(--border-light);
        transition: all 0.2s;
      }

      .online-player-item:hover {
        background: var(--bg-dark);
      }

      .online-player-avatar-wrapper {
        position: relative;
        flex-shrink: 0;
      }

      .online-player-avatar {
        width: 40px;
        height: 40px;
        border-radius: var(--radius-pill);
        background: var(--gradient-button-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-primary);
        font-weight: 600;
      }

      .online-player-status-dot {
        position: absolute;
        bottom: -2px;
        right: -2px;
        width: 12px;
        height: 12px;
        border-radius: var(--radius-pill);
        border: 2px solid var(--bg-card);
      }

      .online-player-status-dot.online {
        background: var(--status-online);
      }

      .online-player-status-dot.in-game {
        background: var(--status-ingame);
      }

      .online-player-status-dot.away {
        background: var(--status-away);
      }

      .online-player-info {
        flex: 1;
        min-width: 0;
      }

      .online-player-name {
        color: var(--text-primary);
        font-size: var(--font-sm);
        font-weight: 500;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .online-player-status {
        color: var(--text-secondary);
        font-size: var(--font-xs);
        text-transform: capitalize;
      }

      /* Message Log Panel */
      .message-log-panel {
        border-radius: var(--glass-radius);
        background: var(--glass-bg);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        border: 1px solid var(--glass-border);
        padding: 1rem;
        display: flex;
        flex-direction: column;
        max-height: 400px;
      }

      .message-log-content {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-width: thin;
        scrollbar-color: var(--bg-card) transparent;
      }

      .message-log-content::-webkit-scrollbar {
        width: 6px;
      }

      .message-log-content::-webkit-scrollbar-track {
        background: transparent;
      }

      .message-log-content::-webkit-scrollbar-thumb {
        background: var(--bg-card);
        border-radius: 3px;
      }

      .message-log-content::-webkit-scrollbar-thumb:hover {
        background: var(--bg-card);
        filter: brightness(1.2);
      }

      .message-log-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .message-log-entry {
        padding: 0.5rem;
        border-radius: var(--radius-sm);
        background: var(--bg-card-dark);
        font-size: var(--font-sm);
        line-height: 1.4;
        display: flex;
        gap: 0.5rem;
        align-items: flex-start;
        border-left: 2px solid transparent;
        color: var(--text-secondary);
      }

      .message-log-entry--player_joined {
        border-left-color: var(--status-online);
      }

      .message-log-entry--player_left {
        border-left-color: var(--status-away);
      }

      .message-log-entry--game_created {
        border-left-color: var(--accent-primary);
      }

      .message-log-entry--game_started {
        border-left-color: var(--status-ingame);
      }

      .message-log-entry--game_finished {
        border-left-color: var(--accent-highlight);
      }

      .message-log-entry--player_joined_game {
        border-left-color: var(--accent-primary);
      }

      .message-log-time {
        color: var(--text-muted);
        font-size: var(--font-xs);
        font-weight: 500;
        flex-shrink: 0;
        line-height: 1.4;
      }

      .message-log-text {
        color: var(--text-secondary);
        flex: 1;
      }

      /* Create Game Modal */
      .create-game-modal {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        background: var(--overlay-bg);
      }

      .create-game-modal.visible {
        display: flex;
      }

      .create-game-modal-content {
        width: 100%;
        max-width: 480px;
        border-radius: var(--glass-radius);
        background: var(--bg-dark);
        border: 1px solid var(--border-default);
        box-shadow: var(--shadow-modal);
      }

      .create-game-modal-header {
        padding: 1.5rem;
        border-bottom: 1px solid var(--border-default);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .create-game-modal-title {
        font-size: 1.25rem;
        color: var(--text-primary);
        font-weight: 600;
      }

      .create-game-modal-close {
        padding: 0.25rem;
        border: none;
        background: transparent;
        color: var(--text-secondary);
        cursor: pointer;
        transition: color 0.2s;
      }

      .create-game-modal-close:hover {
        color: var(--text-primary);
      }

      .create-game-modal-close svg {
        width: 20px;
        height: 20px;
      }

      .create-game-modal-body {
        padding: 1.5rem;
      }

      .create-game-form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .field-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .field-label {
        font-size: 0.875rem;
        color: var(--text-secondary);
        font-weight: 500;
      }

      .lobby-input,
      .lobby-select {
        width: 100%;
        padding: 0.625rem 0.875rem;
        border-radius: var(--radius-md);
        border: 1px solid var(--border-light);
        background: var(--bg-dark);
        color: var(--text-primary);
        font: inherit;
        transition: all 0.2s;
      }

      .lobby-input:focus,
      .lobby-select:focus {
        outline: none;
        border-color: var(--accent-primary);
      }

      .lobby-input:disabled,
      .lobby-select:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .create-game-modal-footer {
        padding: 1rem 1.5rem;
        border-top: 1px solid var(--border-default);
        display: flex;
        gap: 0.75rem;
        justify-content: flex-end;
      }

      .lobby-button {
        padding: 0.625rem 1rem;
        border-radius: var(--radius-md);
        border: none;
        font: inherit;
        font-weight: 600;
        font-size: var(--font-sm);
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .lobby-button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .lobby-button-secondary {
        background: var(--bg-card);
        color: var(--text-primary);
      }

      .lobby-button-secondary:hover:not(:disabled) {
        background: var(--pg-slate-700);
      }

      .lobby-button-primary {
        background: var(--gradient-button-primary);
        color: var(--text-primary);
      }

      .lobby-button-primary:hover:not(:disabled) {
        transform: scale(1.02);
        filter: brightness(1.1);
      }

      /* Notifications */
      .lobby-notice {
        position: fixed;
        top: 5rem;
        left: 50%;
        transform: translateX(-50%);
        max-width: 480px;
        width: calc(100% - 2rem);
        padding: 1rem 1.25rem;
        border-radius: var(--radius-md);
        border: 1px solid transparent;
        z-index: 100;
        display: none;
        box-shadow: var(--shadow-card);
      }

      .lobby-notice.visible {
        display: block;
      }

      .lobby-notice.info {
        background: var(--notice-info-bg);
        border-color: var(--notice-info-border);
        color: var(--notice-info-text);
      }

      .lobby-notice.error {
        background: var(--notice-error-bg);
        border-color: var(--notice-error-border);
        color: var(--notice-error-text);
      }

      /* Waiting Room Overlay (keep existing styles) */
      #waiting-room-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(0, 0, 0, 0.72);
        z-index: 10;
      }

      #waiting-room-overlay.visible {
        display: flex;
      }

      .waiting-room-panel {
        width: min(560px, 100%);
        display: flex;
        flex-direction: column;
        gap: 20px;
        padding: 24px;
        border: 1px solid rgba(126, 207, 255, 0.22);
        border-radius: 18px;
        background: rgba(26, 26, 46, 0.96);
        box-shadow: 0 20px 48px rgba(0, 0, 0, 0.45);
      }

      .overlay-header {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .overlay-title {
        font-size: clamp(1.75rem, 4vw, 2.5rem);
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .overlay-subtitle {
        color: #9aa3b2;
        line-height: 1.5;
      }

      .section-title {
        font-size: 0.82rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #7ecfff;
      }

      .waiting-room-share-hint {
        margin-top: -8px;
        color: #9aa3b2;
        line-height: 1.5;
      }

      .waiting-room-share-row {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .waiting-room-share-input {
        flex: 1;
        min-width: 0;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(126, 207, 255, 0.22);
        background: rgba(16, 16, 29, 0.92);
        color: #f4f6fb;
        font: inherit;
      }

      .waiting-room-share-input:focus {
        outline: 2px solid rgba(126, 207, 255, 0.45);
        outline-offset: 2px;
      }

      .waiting-room-copy-button {
        flex-shrink: 0;
      }

      .waiting-room-share-feedback {
        min-height: 1.25rem;
        font-size: 0.9rem;
        color: #9aa3b2;
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      .waiting-room-share-feedback.visible {
        opacity: 1;
      }

      .waiting-room-share-feedback.success {
        color: #8ff0b0;
      }

      .waiting-room-share-feedback.error {
        color: #fca5a5;
      }

      .waiting-room-player-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .waiting-room-player,
      .waiting-room-empty {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-radius: 14px;
        background: #10101d;
        border: 1px solid rgba(126, 207, 255, 0.1);
      }

      .waiting-room-empty {
        color: #9aa3b2;
      }

      .waiting-room-player-meta {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }

      .waiting-room-player-name {
        font-weight: 600;
      }

      .waiting-room-chip {
        padding: 3px 8px;
        border-radius: 999px;
        background: rgba(126, 207, 255, 0.16);
        color: #d9f3ff;
        font-size: 0.78rem;
      }

      .waiting-room-ready {
        font-size: 0.92rem;
      }

      .waiting-room-ready.ready {
        color: #8ff0b0;
      }

      .waiting-room-ready.not-ready {
        color: #d7dde8;
      }

      .waiting-room-error {
        padding: 14px 16px;
        border-radius: 10px;
        background: rgba(248, 113, 113, 0.12);
        border: 1px solid rgba(248, 113, 113, 0.3);
        color: #fca5a5;
        font-size: 0.92rem;
        line-height: 1.5;
        text-align: center;
      }

      .waiting-room-controls {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        flex-wrap: wrap;
      }

      .lobby-button.is-active {
        background: rgba(143, 240, 176, 0.18);
        border-color: rgba(143, 240, 176, 0.38);
        color: #dcffe6;
      }

      #reconnect-overlay {
        position: fixed;
        top: var(--space-md);
        right: var(--space-md);
        left: auto;
        bottom: auto;
        display: none;
        z-index: 30;
        pointer-events: auto;
      }

      #reconnect-overlay.visible {
        display: flex;
      }

      .reconnect-panel {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        border-radius: var(--radius-lg);
        border: 1px solid var(--glass-border);
        background: var(--glass-bg-strong);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        box-shadow: var(--shadow-card);
        text-align: left;
        max-width: 340px;
      }

      .reconnect-panel.is-success {
        border-color: rgba(34, 197, 94, 0.4);
      }

      .reconnect-panel.is-error {
        border-color: rgba(239, 68, 68, 0.4);
      }

      .reconnect-badge {
        display: none;
      }

      .reconnect-spinner {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 2px solid var(--border-light);
        border-top-color: var(--accent-highlight);
        animation: reconnect-spin 0.85s linear infinite;
        flex-shrink: 0;
      }

      .reconnect-title {
        color: var(--text-primary);
        font-size: var(--font-sm);
        font-weight: 600;
        line-height: 1.3;
        white-space: nowrap;
      }

      .reconnect-subtitle {
        color: var(--text-muted);
        font-size: var(--font-xs);
        line-height: 1.4;
        display: none;
      }

      @keyframes reconnect-spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Game Over Overlay */
      .game-over-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(10, 10, 26, 0.85);
        backdrop-filter: blur(12px);
        z-index: 40;
      }

      .game-over-content {
        width: min(460px, 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 40px 32px;
        border-radius: 20px;
        border: 1px solid rgba(124, 58, 237, 0.4);
        background: linear-gradient(180deg, rgba(18, 18, 41, 0.98), rgba(10, 10, 26, 0.98));
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
        text-align: center;
      }

      .game-over-result {
        color: #f4f6fb;
        font-size: clamp(2rem, 5vw, 3rem);
        font-weight: 800;
        line-height: 1.1;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        background: linear-gradient(135deg, #7c3aed, #c4b5fd);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .game-over-message {
        color: #d1d5db;
        font-size: 1.125rem;
        line-height: 1.6;
        max-width: 32ch;
      }

      .game-over-button {
        margin-top: 8px;
        padding: 14px 32px;
        border-radius: 12px;
        border: 1px solid rgba(124, 58, 237, 0.5);
        background: linear-gradient(135deg, #7c3aed, #6d28d9);
        color: #ffffff;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .game-over-button:hover {
        background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        border-color: rgba(167, 139, 250, 0.6);
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(124, 58, 237, 0.3);
      }

      .game-over-button:active {
        transform: translateY(0);
      }

      /* Responsive */
      @media (max-width: 1024px) {
        .lobby-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .lobby-header-inner {
          padding: 0.75rem 1rem;
        }

        .lobby-content {
          padding: 1rem;
        }

        .game-library-header {
          flex-direction: column;
          align-items: flex-start;
        }

        .game-tiles-grid {
          grid-template-columns: 1fr;
        }

        .lobby-header-user span {
          display: none;
        }

        #waiting-room-overlay {
          padding: 16px;
        }

        .waiting-room-panel {
          padding: 18px;
        }

        .waiting-room-share-row,
        .waiting-room-controls {
          flex-direction: column;
        }

        .waiting-room-share-input,
        .waiting-room-copy-button,
        .waiting-room-controls .lobby-button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="game-container"></div>
      <div id="lobby-overlay"></div>
      <div id="setup-overlay"></div>
      <div id="waiting-room-overlay"></div>
      <div id="reconnect-overlay"></div>
      <div id="console-log-container"></div>
    </div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
