<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>playgrid</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        color: #f4f6fb;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        position: relative;
      }

      #app,
      #game-container {
        width: 100%;
        height: 100%;
      }

      #game-container canvas {
        display: block;
      }

      /* Lobby Dashboard Styles */
      #lobby-overlay {
        position: fixed;
        inset: 0;
        display: none;
        z-index: 10;
        overflow-y: auto;
        background: linear-gradient(to bottom right, #18181b, #18181b, #3b0764);
      }

      #lobby-overlay.visible {
        display: block;
      }

      .lobby-dashboard {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* Header */
      .lobby-header {
        border-bottom: 1px solid #27272a;
        background: rgba(24, 24, 27, 0.5);
        backdrop-filter: blur(12px);
        position: sticky;
        top: 0;
        z-index: 20;
      }

      .lobby-header-inner {
        max-width: 1280px;
        margin: 0 auto;
        padding: 1rem 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
      }

      .lobby-header-left {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .lobby-logo {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        background: linear-gradient(to bottom right, #7c3aed, #9333ea);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .lobby-logo svg {
        width: 24px;
        height: 24px;
        color: white;
      }

      .lobby-title-group {
        display: flex;
        flex-direction: column;
      }

      .lobby-title {
        font-size: 1.25rem;
        color: white;
        font-weight: 600;
        line-height: 1.2;
      }

      .lobby-subtitle {
        font-size: 0.875rem;
        color: #a1a1aa;
      }

      .lobby-header-right {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .lobby-header-button {
        padding: 0.5rem;
        border-radius: 8px;
        background: #27272a;
        color: #a1a1aa;
        border: none;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .lobby-header-button:hover {
        background: #3f3f46;
        color: white;
      }

      .lobby-header-button svg {
        width: 20px;
        height: 20px;
      }

      .lobby-header-user {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        background: #27272a;
        color: #a1a1aa;
        border: none;
        cursor: pointer;
        transition: all 0.2s;
      }

      .lobby-header-user:hover {
        background: #3f3f46;
        color: white;
      }

      .lobby-header-user svg {
        width: 20px;
        height: 20px;
      }

      .lobby-header-user span {
        font-size: 0.875rem;
      }

      /* Main Content */
      .lobby-content {
        max-width: 1280px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
        flex: 1;
      }

      .lobby-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }

      @media (min-width: 1024px) {
        .lobby-grid {
          grid-template-columns: 1fr 360px;
        }
      }

      /* Game Library */
      .game-library {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .game-library-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 1rem;
      }

      .game-library-title {
        font-size: 1.5rem;
        color: white;
        font-weight: 600;
      }

      .game-library-toolbar {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .create-game-trigger {
        padding: 0.5rem 1rem;
        border-radius: 8px;
        background: #7c3aed;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.875rem;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .create-game-trigger:hover {
        background: #6d28d9;
      }

      .create-game-trigger svg {
        width: 16px;
        height: 16px;
      }

      /* Filter buttons */
      .lobby-filters {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .lobby-filter-button {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 0.875rem;
        border: 1px solid #3f3f46;
        border-radius: 999px;
        background: transparent;
        color: #d4d4d8;
        font: inherit;
        font-size: 0.875rem;
        cursor: pointer;
        transition: all 0.2s;
      }

      .lobby-filter-button:hover {
        background: rgba(124, 58, 237, 0.1);
        border-color: #7c3aed;
      }

      .lobby-filter-button.active {
        background: rgba(124, 58, 237, 0.2);
        border-color: #7c3aed;
        color: white;
      }

      .filter-badge {
        min-width: 20px;
        height: 20px;
        padding: 0 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        font-weight: 600;
      }

      /* Game Tiles Grid */
      .game-tiles-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
      }

      @media (min-width: 640px) {
        .game-tiles-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (min-width: 1024px) {
        .game-tiles-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      .game-tile {
        position: relative;
        overflow: hidden;
        border-radius: 12px;
        background: #27272a;
        cursor: pointer;
        transition: all 0.3s;
        border: none;
        padding: 0;
        text-align: left;
      }

      .game-tile:hover {
        transform: scale(1.05);
        box-shadow: 0 20px 48px rgba(124, 58, 237, 0.2);
      }

      .game-tile-image {
        aspect-ratio: 4/3;
        overflow: hidden;
        position: relative;
      }

      .game-tile-image::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(10, 10, 18, 0.94) 0%, rgba(10, 10, 18, 0.62) 46%, rgba(10, 10, 18, 0.18) 74%, transparent 100%);
        z-index: 1;
      }

      .game-tile:hover .game-tile-image-inner {
        transform: scale(1.1);
      }

      .game-tile-image-inner {
        width: 100%;
        height: 100%;
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        transition: transform 0.3s;
      }

      .game-tile-content {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 1rem;
        z-index: 2;
      }

      .game-tile-name {
        font-size: 1.25rem;
        color: white;
        font-weight: 600;
        margin-bottom: 0.5rem;
        text-shadow: 0 4px 18px rgba(0, 0, 0, 0.6);
      }

      .game-tile-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 0.875rem;
        text-shadow: 0 2px 14px rgba(0, 0, 0, 0.55);
      }

      .game-tile-players {
        display: flex;
        align-items: center;
        gap: 0.25rem;
        color: #d4d4d8;
      }

      .game-tile-players svg {
        width: 16px;
        height: 16px;
      }

      .game-tile-active {
        color: #c084fc;
        font-weight: 500;
      }

      /* Sidebar */
      .lobby-sidebar {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      /* Active Games Panel */
      .active-games-panel,
      .online-players-panel {
        border-radius: 12px;
        background: rgba(39, 39, 42, 0.5);
        backdrop-filter: blur(12px);
        padding: 1rem;
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1rem;
      }

      .panel-title {
        font-size: 1.125rem;
        color: white;
        font-weight: 600;
      }

      .panel-badge {
        padding: 0.25rem 0.625rem;
        border-radius: 999px;
        background: #7c3aed;
        color: white;
        font-size: 0.875rem;
        font-weight: 600;
      }

      .panel-content {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      /* Active Game Card */
      .active-game-card {
        border-radius: 8px;
        background: rgba(24, 24, 27, 0.5);
        padding: 0.75rem;
        border: 1px solid rgba(63, 63, 70, 0.5);
        transition: all 0.2s;
      }

      .active-game-card:hover {
        border-color: rgba(124, 58, 237, 0.5);
      }

      .active-game-header {
        display: flex;
        align-items: start;
        justify-content: space-between;
        margin-bottom: 0.5rem;
        gap: 0.5rem;
      }

      .active-game-info {
        flex: 1;
        min-width: 0;
      }

      .active-game-name {
        color: white;
        font-weight: 500;
        font-size: 0.9375rem;
        margin-bottom: 0.25rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .active-game-meta {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        color: #a1a1aa;
        font-size: 0.75rem;
      }

      .active-game-meta-item {
        display: flex;
        align-items: center;
        gap: 0.25rem;
      }

      .active-game-meta-item svg {
        width: 12px;
        height: 12px;
      }

      .game-status-badge {
        padding: 0.125rem 0.5rem;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 500;
        white-space: nowrap;
      }

      .game-status-badge.waiting {
        background: rgba(245, 158, 11, 0.2);
        color: #fbbf24;
      }

      .game-status-badge.playing {
        background: rgba(34, 197, 94, 0.2);
        color: #4ade80;
      }

      .active-game-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }

      .active-game-players {
        display: flex;
        margin-left: -0.5rem;
      }

      .player-avatar {
        width: 24px;
        height: 24px;
        border-radius: 999px;
        background: linear-gradient(to bottom right, #7c3aed, #9333ea);
        border: 2px solid #18181b;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        color: white;
        font-weight: 600;
      }

      .active-game-join-btn {
        display: flex;
        align-items: center;
        gap: 0.25rem;
        padding: 0.25rem 0.75rem;
        border-radius: 6px;
        background: #7c3aed;
        color: white;
        border: none;
        cursor: pointer;
        font-size: 0.75rem;
        font-weight: 600;
        transition: all 0.2s;
      }

      .active-game-join-btn:hover {
        background: #6d28d9;
      }

      .active-game-join-btn svg {
        width: 12px;
        height: 12px;
      }

      /* Online Players Panel */
      .online-player-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.5rem;
        border-radius: 8px;
        background: rgba(24, 24, 27, 0.5);
        transition: all 0.2s;
      }

      .online-player-item:hover {
        background: #18181b;
      }

      .online-player-avatar-wrapper {
        position: relative;
        flex-shrink: 0;
      }

      .online-player-avatar {
        width: 40px;
        height: 40px;
        border-radius: 999px;
        background: linear-gradient(to bottom right, #7c3aed, #9333ea);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 600;
      }

      .online-player-status-dot {
        position: absolute;
        bottom: -2px;
        right: -2px;
        width: 12px;
        height: 12px;
        border-radius: 999px;
        border: 2px solid rgba(24, 24, 27, 0.8);
      }

      .online-player-status-dot.online {
        background: #22c55e;
      }

      .online-player-status-dot.in-game {
        background: #f59e0b;
      }

      .online-player-status-dot.away {
        background: #71717a;
      }

      .online-player-info {
        flex: 1;
        min-width: 0;
      }

      .online-player-name {
        color: white;
        font-size: 0.875rem;
        font-weight: 500;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .online-player-status {
        color: #a1a1aa;
        font-size: 0.75rem;
        text-transform: capitalize;
      }

      .panel-empty {
        text-align: center;
        padding: 2rem 1rem;
        color: #71717a;
        font-size: 0.875rem;
      }

      /* Create Game Modal */
      .create-game-modal {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        background: rgba(0, 0, 0, 0.75);
      }

      .create-game-modal.visible {
        display: flex;
      }

      .create-game-modal-content {
        width: 100%;
        max-width: 480px;
        border-radius: 12px;
        background: #18181b;
        border: 1px solid #27272a;
        box-shadow: 0 20px 48px rgba(0, 0, 0, 0.5);
      }

      .create-game-modal-header {
        padding: 1.5rem;
        border-bottom: 1px solid #27272a;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .create-game-modal-title {
        font-size: 1.25rem;
        color: white;
        font-weight: 600;
      }

      .create-game-modal-close {
        padding: 0.25rem;
        border: none;
        background: transparent;
        color: #a1a1aa;
        cursor: pointer;
        transition: color 0.2s;
      }

      .create-game-modal-close:hover {
        color: white;
      }

      .create-game-modal-close svg {
        width: 20px;
        height: 20px;
      }

      .create-game-modal-body {
        padding: 1.5rem;
      }

      .create-game-form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .field-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .field-label {
        font-size: 0.875rem;
        color: #d4d4d8;
        font-weight: 500;
      }

      .lobby-input,
      .lobby-select {
        width: 100%;
        padding: 0.625rem 0.875rem;
        border-radius: 8px;
        border: 1px solid #3f3f46;
        background: #09090b;
        color: white;
        font: inherit;
        transition: all 0.2s;
      }

      .lobby-input:focus,
      .lobby-select:focus {
        outline: none;
        border-color: #7c3aed;
      }

      .lobby-input:disabled,
      .lobby-select:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .create-game-modal-footer {
        padding: 1rem 1.5rem;
        border-top: 1px solid #27272a;
        display: flex;
        gap: 0.75rem;
        justify-content: flex-end;
      }

      .lobby-button {
        padding: 0.625rem 1rem;
        border-radius: 8px;
        border: none;
        font: inherit;
        font-weight: 600;
        font-size: 0.875rem;
        cursor: pointer;
        transition: all 0.2s;
      }

      .lobby-button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .lobby-button-secondary {
        background: #27272a;
        color: white;
      }

      .lobby-button-secondary:hover:not(:disabled) {
        background: #3f3f46;
      }

      .lobby-button-primary {
        background: #7c3aed;
        color: white;
      }

      .lobby-button-primary:hover:not(:disabled) {
        background: #6d28d9;
      }

      /* Notifications */
      .lobby-notice {
        position: fixed;
        top: 5rem;
        left: 50%;
        transform: translateX(-50%);
        max-width: 480px;
        width: calc(100% - 2rem);
        padding: 1rem 1.25rem;
        border-radius: 8px;
        border: 1px solid transparent;
        z-index: 100;
        display: none;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.3);
      }

      .lobby-notice.visible {
        display: block;
      }

      .lobby-notice.info {
        background: rgba(56, 189, 248, 0.15);
        border-color: rgba(56, 189, 248, 0.3);
        color: #bae6fd;
      }

      .lobby-notice.error {
        background: rgba(239, 68, 68, 0.15);
        border-color: rgba(239, 68, 68, 0.3);
        color: #fecaca;
      }

      /* Waiting Room Overlay (keep existing styles) */
      #waiting-room-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(0, 0, 0, 0.72);
        z-index: 10;
      }

      #waiting-room-overlay.visible {
        display: flex;
      }

      .waiting-room-panel {
        width: min(560px, 100%);
        display: flex;
        flex-direction: column;
        gap: 20px;
        padding: 24px;
        border: 1px solid rgba(126, 207, 255, 0.22);
        border-radius: 18px;
        background: rgba(26, 26, 46, 0.96);
        box-shadow: 0 20px 48px rgba(0, 0, 0, 0.45);
      }

      .overlay-header {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .overlay-title {
        font-size: clamp(1.75rem, 4vw, 2.5rem);
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .overlay-subtitle {
        color: #9aa3b2;
        line-height: 1.5;
      }

      .section-title {
        font-size: 0.82rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #7ecfff;
      }

      .waiting-room-player-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .waiting-room-player,
      .waiting-room-empty {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-radius: 14px;
        background: #10101d;
        border: 1px solid rgba(126, 207, 255, 0.1);
      }

      .waiting-room-empty {
        color: #9aa3b2;
      }

      .waiting-room-player-meta {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }

      .waiting-room-player-name {
        font-weight: 600;
      }

      .waiting-room-chip {
        padding: 3px 8px;
        border-radius: 999px;
        background: rgba(126, 207, 255, 0.16);
        color: #d9f3ff;
        font-size: 0.78rem;
      }

      .waiting-room-ready {
        font-size: 0.92rem;
      }

      .waiting-room-ready.ready {
        color: #8ff0b0;
      }

      .waiting-room-ready.not-ready {
        color: #d7dde8;
      }

      .waiting-room-error {
        padding: 14px 16px;
        border-radius: 10px;
        background: rgba(248, 113, 113, 0.12);
        border: 1px solid rgba(248, 113, 113, 0.3);
        color: #fca5a5;
        font-size: 0.92rem;
        line-height: 1.5;
        text-align: center;
      }

      .waiting-room-controls {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        flex-wrap: wrap;
      }

      .lobby-button.is-active {
        background: rgba(143, 240, 176, 0.18);
        border-color: rgba(143, 240, 176, 0.38);
        color: #dcffe6;
      }

      #reconnect-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(10, 10, 26, 0.82);
        backdrop-filter: blur(12px);
        z-index: 30;
      }

      #reconnect-overlay.visible {
        display: flex;
      }

      .reconnect-panel {
        width: min(420px, 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        padding: 32px 28px;
        border-radius: 20px;
        border: 1px solid rgba(124, 58, 237, 0.36);
        background: linear-gradient(180deg, rgba(18, 18, 41, 0.98), rgba(10, 10, 26, 0.98));
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.48);
        text-align: center;
      }

      .reconnect-panel.is-success {
        border-color: rgba(56, 189, 248, 0.38);
      }

      .reconnect-panel.is-error {
        border-color: rgba(248, 113, 113, 0.38);
      }

      .reconnect-badge {
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(124, 58, 237, 0.16);
        color: #c4b5fd;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .reconnect-spinner {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 3px solid rgba(124, 58, 237, 0.18);
        border-top-color: #7c3aed;
        animation: reconnect-spin 0.85s linear infinite;
      }

      .reconnect-title {
        color: #e2e8f0;
        font-size: clamp(1.5rem, 4vw, 2.1rem);
        font-weight: 700;
        line-height: 1.2;
      }

      .reconnect-subtitle {
        max-width: 28ch;
        color: #a1a1aa;
        line-height: 1.6;
      }

      @keyframes reconnect-spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Game Over Overlay */
      .game-over-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(10, 10, 26, 0.85);
        backdrop-filter: blur(12px);
        z-index: 40;
      }

      .game-over-content {
        width: min(460px, 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 40px 32px;
        border-radius: 20px;
        border: 1px solid rgba(124, 58, 237, 0.4);
        background: linear-gradient(180deg, rgba(18, 18, 41, 0.98), rgba(10, 10, 26, 0.98));
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
        text-align: center;
      }

      .game-over-result {
        color: #f4f6fb;
        font-size: clamp(2rem, 5vw, 3rem);
        font-weight: 800;
        line-height: 1.1;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        background: linear-gradient(135deg, #7c3aed, #c4b5fd);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .game-over-message {
        color: #d1d5db;
        font-size: 1.125rem;
        line-height: 1.6;
        max-width: 32ch;
      }

      .game-over-button {
        margin-top: 8px;
        padding: 14px 32px;
        border-radius: 12px;
        border: 1px solid rgba(124, 58, 237, 0.5);
        background: linear-gradient(135deg, #7c3aed, #6d28d9);
        color: #ffffff;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .game-over-button:hover {
        background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        border-color: rgba(167, 139, 250, 0.6);
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(124, 58, 237, 0.3);
      }

      .game-over-button:active {
        transform: translateY(0);
      }

      /* Responsive */
      @media (max-width: 1024px) {
        .lobby-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .lobby-header-inner {
          padding: 0.75rem 1rem;
        }

        .lobby-content {
          padding: 1rem;
        }

        .game-library-header {
          flex-direction: column;
          align-items: flex-start;
        }

        .game-tiles-grid {
          grid-template-columns: 1fr;
        }

        .lobby-header-user span {
          display: none;
        }

        #waiting-room-overlay,
        #reconnect-overlay {
          padding: 16px;
        }

        .waiting-room-panel,
        .reconnect-panel {
          padding: 18px;
        }

        .waiting-room-controls {
          flex-direction: column;
        }

        .waiting-room-controls .lobby-button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="game-container"></div>
      <div id="lobby-overlay"></div>
      <div id="waiting-room-overlay"></div>
      <div id="reconnect-overlay"></div>
    </div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
