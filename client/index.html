<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>Playgrid - Online Board Games</title>
    <style>
      :root {
        /* === Base Neutrals === */
        --bg-primary: #0A0A0A;          /* zinc-900 */
        --bg-dark: #18181B;             /* zinc-800 */
        --bg-card: #27272A;             /* zinc-700 */
        --bg-glass: rgba(24, 24, 27, 0.5);  /* zinc-800/50 */
        --bg-card-dark: rgba(9, 9, 11, 0.5); /* zinc-900/50 */
        
        /* === Text Colors === */
        --text-primary: #FFFFFF;
        --text-secondary: #A1A1A1;      /* zinc-400 */
        --text-muted: #71717A;          /* zinc-500 */
        
        /* === Border Colors === */
        --border-default: #18181B;      /* zinc-800 */
        --border-light: rgba(63, 63, 70, 0.5); /* zinc-700/50 */
        
        /* === Accent Colors === */
        --accent-violet: #A78BFA;       /* violet-400 */
        --accent-purple: #9333EA;       /* purple-600 */
        --accent-violet-bg: #7C3AED;    /* violet-600 */
        
        /* === Status Colors === */
        --status-online: #22C55E;       /* green-500 */
        --status-ingame: #F59E0B;       /* amber-500 */
        --status-away: #71717A;         /* zinc-500 */
        --status-danger: rgba(127, 29, 29, 0.5); /* red-900/50 */
        
        /* === Player Colors === */
        --player-red: #DC2626;
        --player-blue: #2563EB;
        --player-green: #16A34A;
        --player-yellow: #CA8A04;
        --player-purple: #9333EA;
        --player-orange: #EA580C;
        
        /* === Gradients === */
        --gradient-page: linear-gradient(to bottom right, #0A0A0A, #0A0A0A, #3F1659);
        --gradient-phase-banner: linear-gradient(to right, rgba(76, 29, 149, 0.5), rgba(88, 28, 146, 0.5));
        --gradient-button-primary: linear-gradient(to bottom right, #7C3AED, #9333EA);
        --gradient-button-danger: linear-gradient(to bottom right, #DC2626, #B91C1C);
        
        /* === Glass-morphism === */
        --glass-bg: rgba(24, 24, 27, 0.5);
        --glass-blur: 4px;
        --glass-border: rgba(63, 63, 70, 0.5);
        --glass-radius: 0.75rem;        /* rounded-xl */
        
        /* === Spacing === */
        --space-xs: 0.25rem;
        --space-sm: 0.5rem;
        --space-md: 1rem;
        --space-lg: 1.5rem;
        --space-xl: 2rem;
        
        /* === Typography === */
        --font-base: 1rem;
        --font-sm: 0.875rem;
        --font-xs: 0.75rem;
        --font-lg: 1.125rem;
        --font-xl: 1.25rem;
        --font-2xl: 1.5rem;

        --game-sidebar-width: 304px;
        --game-sidebar-gap: 16px;
        --game-sidebar-edge-offset: 16px;
        --game-sidebar-layout-reserve: calc(
          var(--game-sidebar-width) +
          var(--game-sidebar-gap) +
          var(--game-sidebar-edge-offset)
        );
      }

      /* === Utility Classes === */
      .glass-panel {
        background: var(--glass-bg);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        border: 1px solid var(--glass-border);
        border-radius: var(--glass-radius);
      }

      .status-dot {
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 50%;
        display: inline-block;
      }

      .status-dot.online {
        background: var(--status-online);
      }

      .status-dot.ingame {
        background: var(--status-ingame);
      }

      .status-dot.away {
        background: var(--status-away);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        color: #f4f6fb;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        position: relative;
      }

      #app,
      #game-container {
        width: 100%;
        height: 100%;
      }

      #game-container {
        transition: width 220ms ease;
      }

      body.game-layout-sidebar-active #game-container {
        width: max(0px, calc(100% - var(--game-sidebar-layout-reserve)));
      }

      #game-container canvas {
        display: block;
      }

      @media (max-width: 767px) {
        body.game-layout-sidebar-active #game-container {
          width: 100%;
        }
      }

      /* Lobby Dashboard Styles */
      #lobby-overlay {
        position: fixed;
        inset: 0;
        display: none;
        z-index: 10;
        overflow-y: auto;
        background: linear-gradient(to bottom right, #020617, #0f172a, #1e293b);
      }

      #lobby-overlay.visible {
        display: block;
      }

      .lobby-dashboard {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: linear-gradient(to bottom right, #020617, #0f172a, #1e293b);
      }

      /* Header */
      .lobby-header {
        border-bottom: 1px solid #1e293b;
        background: rgba(15, 23, 42, 0.5);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        position: sticky;
        top: 0;
        z-index: 20;
        height: 64px;
        display: flex;
        align-items: center;
      }

      .lobby-header-inner {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0 var(--space-lg);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex: 1;
        height: 100%;
      }

      .lobby-header-left {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .lobby-logo {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        background: linear-gradient(to bottom right, #2563eb, #1d4ed8);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .lobby-logo svg {
        width: 24px;
        height: 24px;
        color: white;
      }

      .lobby-title-group {
        display: flex;
        flex-direction: column;
      }

      .lobby-title {
        font-size: 1.25rem;
        color: white;
        font-weight: 600;
        line-height: 1.2;
      }

      .lobby-subtitle {
        font-size: 0.875rem;
        color: #a1a1aa;
      }

      .lobby-header-right {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .lobby-header-button {
        padding: 0.5rem;
        border-radius: 8px;
        background: #1e293b;
        color: #94a3b8;
        border: none;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .lobby-header-button:hover {
        background: #334155;
        color: white;
      }

      .lobby-header-button svg {
        width: 20px;
        height: 20px;
      }

      .lobby-header-user {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        background: #1e293b;
        color: #94a3b8;
        border: none;
        cursor: pointer;
        transition: all 0.2s;
      }

      .lobby-header-user:hover {
        background: #334155;
        color: white;
      }

      .lobby-header-user svg {
        width: 20px;
        height: 20px;
      }

      .lobby-header-user span {
        font-size: 0.875rem;
      }

      /* Main Content */
      .lobby-content {
        max-width: 1280px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
        flex: 1;
      }

      .lobby-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }

      @media (min-width: 1024px) {
        .lobby-grid {
          grid-template-columns: 1fr 360px;
        }
      }

      /* Game Library */
      .game-library {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .game-library-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 1rem;
      }

      .game-library-title {
        font-size: 1.5rem;
        color: var(--text-primary);
        font-weight: 600;
      }

      .game-library-toolbar {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .create-game-trigger {
        padding: 0.5rem 1rem;
        border-radius: 0.5rem;
        background: var(--gradient-button-primary);
        color: white;
        border: none;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.875rem;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .create-game-trigger:hover {
        transform: scale(1.02);
        filter: brightness(1.1);
      }

      .create-game-trigger svg {
        width: 16px;
        height: 16px;
      }

      /* Filter buttons */
      .lobby-filters {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .lobby-filter-button {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 0.875rem;
        border: 1px solid #334155;
        border-radius: 999px;
        background: transparent;
        color: #cbd5e1;
        font: inherit;
        font-size: 0.875rem;
        cursor: pointer;
        transition: all 0.2s;
      }

      .lobby-filter-button:hover {
        background: rgba(59, 130, 246, 0.1);
        border-color: #3b82f6;
      }

      .lobby-filter-button.active {
        background: rgba(59, 130, 246, 0.2);
        border-color: #3b82f6;
        color: white;
      }

      .filter-badge {
        min-width: 20px;
        height: 20px;
        padding: 0 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        font-weight: 600;
      }

      /* Game Tiles Grid */
      .game-tiles-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.5rem;
        padding: var(--space-xl);
      }

      @media (min-width: 640px) {
        .game-tiles-grid {
          grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        }
      }

      @media (min-width: 1024px) {
        .game-tiles-grid {
          grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        }
      }

      .game-tile {
        position: relative;
        overflow: hidden;
        border-radius: var(--glass-radius);
        background: #1e293b;
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        border: 1px solid var(--border-light);
        cursor: pointer;
        transition: all 0.2s ease;
        padding: 0;
        text-align: left;
      }

      .game-tile:hover {
        transform: scale(1.05);
        box-shadow: 0 20px 40px rgba(59, 130, 246, 0.2);
        border-color: rgba(59, 130, 246, 0.5);
        background: #1e293b;
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
      }

      .game-tile-image {
        aspect-ratio: 4/3;
        overflow: hidden;
        position: relative;
      }

      .game-tile-image::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(10, 10, 18, 0.94) 0%, rgba(10, 10, 18, 0.62) 46%, rgba(10, 10, 18, 0.18) 74%, transparent 100%);
        z-index: 1;
      }

      .game-tile:hover .game-tile-image-inner {
        transform: scale(1.1);
      }

      .game-tile-image-inner {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        transition: transform 0.3s;
      }

      .game-tile-content {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 1rem;
        z-index: 2;
      }

      .game-tile-name {
        font-size: 1.125rem;
        color: var(--text-primary);
        font-weight: 600;
        margin-bottom: 0.5rem;
      }

      .game-tile-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 0.875rem;
      }

      .game-tile-players {
        display: flex;
        align-items: center;
        gap: 0.25rem;
        color: var(--text-secondary);
      }

      .game-tile-players svg {
        width: 16px;
        height: 16px;
      }

      .game-tile-active {
        color: #60a5fa;
        font-weight: 500;
      }

      /* Sidebar */
      .lobby-sidebar {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      /* Active Games Panel */
      .active-games-panel,
      .online-players-panel {
        border-radius: var(--glass-radius);
        background: rgba(30, 41, 59, 0.5);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        border: 1px solid rgba(51, 65, 85, 0.5);
        padding: var(--space-lg);
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1rem;
      }

      .panel-title {
        font-size: 1.125rem;
        color: var(--text-primary);
        font-weight: 600;
      }

      .panel-badge {
        padding: 0.25rem 0.625rem;
        border-radius: 999px;
        background: #2563eb;
        color: white;
        font-size: 0.875rem;
        font-weight: 600;
      }

      .panel-content {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .panel-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
        text-align: center;
        color: var(--text-muted);
        font-size: 0.875rem;
      }

      /* Active Game Card */
      .active-game-card {
        border-radius: 0.5rem;
        background: rgba(15, 23, 42, 0.5);
        padding: 0.75rem;
        border: 1px solid rgba(51, 65, 85, 0.5);
        transition: all 0.2s;
      }

      .active-game-card:hover {
        border-color: rgba(59, 130, 246, 0.5);
      }

      .active-game-info {
        flex: 1;
        min-width: 0;
      }

      .active-game-name {
        color: var(--text-primary);
        font-weight: 500;
        font-size: 0.9375rem;
        margin-bottom: 0.25rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .active-game-meta {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        color: var(--text-secondary);
        font-size: 0.75rem;
      }

      .active-game-meta-item {
        display: flex;
        align-items: center;
        gap: 0.25rem;
      }

      .active-game-meta-item svg {
        width: 12px;
        height: 12px;
      }

      .game-status-badge {
        padding: 0.125rem 0.5rem;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 500;
        white-space: nowrap;
      }

      .game-status-badge.waiting {
        background: rgba(245, 158, 11, 0.2);
        color: #fbbf24;
      }

      .game-status-badge.playing {
        background: rgba(34, 197, 94, 0.2);
        color: #4ade80;
      }

      .active-game-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }

      .active-game-players {
        display: flex;
        margin-left: -0.5rem;
      }

      .player-avatar {
        width: 24px;
        height: 24px;
        border-radius: 999px;
        background: linear-gradient(to bottom right, #3b82f6, #2563eb);
        border: 2px solid #0f172a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        color: white;
        font-weight: 600;
      }

      .active-game-join-btn {
        display: flex;
        align-items: center;
        gap: 0.25rem;
        padding: 0.25rem 0.75rem;
        border-radius: 6px;
        background: #2563eb;
        color: white;
        border: none;
        cursor: pointer;
        font-size: 0.75rem;
        font-weight: 600;
        transition: all 0.2s;
      }

      .active-game-join-btn:hover {
        background: #1d4ed8;
      }

      .active-game-join-btn svg {
        width: 12px;
        height: 12px;
      }

      /* Online Players Panel */
      .online-player-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.5rem;
        border-radius: 0.5rem;
        background: rgba(15, 23, 42, 0.5);
        border: 1px solid rgba(51, 65, 85, 0.5);
        transition: all 0.2s;
      }

      .online-player-item:hover {
        background: #0f172a;
      }

      .online-player-avatar-wrapper {
        position: relative;
        flex-shrink: 0;
      }

      .online-player-avatar {
        width: 40px;
        height: 40px;
        border-radius: 999px;
        background: linear-gradient(to bottom right, #3b82f6, #2563eb);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 600;
      }

      .online-player-status-dot {
        position: absolute;
        bottom: -2px;
        right: -2px;
        width: 12px;
        height: 12px;
        border-radius: 999px;
        border: 2px solid #1e293b;
      }

      .online-player-status-dot.online {
        background: var(--status-online);
      }

      .online-player-status-dot.in-game {
        background: var(--status-ingame);
      }

      .online-player-status-dot.away {
        background: var(--status-away);
      }

      .online-player-info {
        flex: 1;
        min-width: 0;
      }

      .online-player-name {
        color: var(--text-primary);
        font-size: 0.875rem;
        font-weight: 500;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .online-player-status {
        color: var(--text-secondary);
        font-size: 0.75rem;
        text-transform: capitalize;
      }

      /* Message Log Panel */
      .message-log-panel {
        border-radius: var(--glass-radius);
        background: rgba(30, 41, 59, 0.5);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        border: 1px solid rgba(51, 65, 85, 0.5);
        padding: 1rem;
        display: flex;
        flex-direction: column;
        max-height: 400px;
      }

      .message-log-content {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-width: thin;
        scrollbar-color: var(--bg-card) transparent;
      }

      .message-log-content::-webkit-scrollbar {
        width: 6px;
      }

      .message-log-content::-webkit-scrollbar-track {
        background: transparent;
      }

      .message-log-content::-webkit-scrollbar-thumb {
        background: var(--bg-card);
        border-radius: 3px;
      }

      .message-log-content::-webkit-scrollbar-thumb:hover {
        background: var(--bg-card);
        filter: brightness(1.2);
      }

      .message-log-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .message-log-entry {
        padding: 0.5rem;
        border-radius: 6px;
        background: var(--bg-card-dark);
        font-size: 0.875rem;
        line-height: 1.4;
        display: flex;
        gap: 0.5rem;
        align-items: flex-start;
        border-left: 2px solid transparent;
        color: var(--text-secondary);
      }

      .message-log-entry--player_joined {
        border-left-color: var(--status-online);
      }

      .message-log-entry--player_left {
        border-left-color: var(--status-away);
      }

      .message-log-entry--game_created {
        border-left-color: var(--accent-violet-bg);
      }

      .message-log-entry--game_started {
        border-left-color: var(--status-ingame);
      }

      .message-log-entry--game_finished {
        border-left-color: #3b82f6;
      }

      .message-log-entry--player_joined_game {
        border-left-color: #a855f7;
      }

      .message-log-time {
        color: #71717a;
        font-size: 0.75rem;
        font-weight: 500;
        flex-shrink: 0;
        line-height: 1.4;
      }

      .message-log-text {
        color: #d4d4d8;
        flex: 1;
      }

      /* Create Game Modal */
      .create-game-modal {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        background: rgba(0, 0, 0, 0.75);
      }

      .create-game-modal.visible {
        display: flex;
      }

      .create-game-modal-content {
        width: 100%;
        max-width: 480px;
        border-radius: var(--glass-radius);
        background: var(--bg-dark);
        border: 1px solid var(--border-default);
        box-shadow: 0 20px 48px rgba(0, 0, 0, 0.5);
      }

      .create-game-modal-header {
        padding: 1.5rem;
        border-bottom: 1px solid var(--border-default);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .create-game-modal-title {
        font-size: 1.25rem;
        color: var(--text-primary);
        font-weight: 600;
      }

      .create-game-modal-close {
        padding: 0.25rem;
        border: none;
        background: transparent;
        color: var(--text-secondary);
        cursor: pointer;
        transition: color 0.2s;
      }

      .create-game-modal-close:hover {
        color: var(--text-primary);
      }

      .create-game-modal-close svg {
        width: 20px;
        height: 20px;
      }

      .create-game-modal-body {
        padding: 1.5rem;
      }

      .create-game-form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .field-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .field-label {
        font-size: 0.875rem;
        color: var(--text-secondary);
        font-weight: 500;
      }

      .lobby-input,
      .lobby-select {
        width: 100%;
        padding: 0.625rem 0.875rem;
        border-radius: 0.5rem;
        border: 1px solid var(--border-light);
        background: var(--bg-primary);
        color: white;
        font: inherit;
        transition: all 0.2s;
      }

      .lobby-input:focus,
      .lobby-select:focus {
        outline: none;
        border-color: var(--accent-violet-bg);
      }

      .lobby-input:disabled,
      .lobby-select:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .create-game-modal-footer {
        padding: 1rem 1.5rem;
        border-top: 1px solid var(--border-default);
        display: flex;
        gap: 0.75rem;
        justify-content: flex-end;
      }

      .lobby-button {
        padding: 0.625rem 1rem;
        border-radius: 0.5rem;
        border: none;
        font: inherit;
        font-weight: 600;
        font-size: 0.875rem;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .lobby-button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .lobby-button-secondary {
        background: var(--bg-dark);
        color: white;
      }

      .lobby-button-secondary:hover:not(:disabled) {
        background: var(--bg-card);
      }

      .lobby-button-primary {
        background: var(--gradient-button-primary);
        color: white;
      }

      .lobby-button-primary:hover:not(:disabled) {
        transform: scale(1.02);
        filter: brightness(1.1);
      }

      /* Notifications */
      .lobby-notice {
        position: fixed;
        top: 5rem;
        left: 50%;
        transform: translateX(-50%);
        max-width: 480px;
        width: calc(100% - 2rem);
        padding: 1rem 1.25rem;
        border-radius: 8px;
        border: 1px solid transparent;
        z-index: 100;
        display: none;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.3);
      }

      .lobby-notice.visible {
        display: block;
      }

      .lobby-notice.info {
        background: rgba(56, 189, 248, 0.15);
        border-color: rgba(56, 189, 248, 0.3);
        color: #bae6fd;
      }

      .lobby-notice.error {
        background: rgba(239, 68, 68, 0.15);
        border-color: rgba(239, 68, 68, 0.3);
        color: #fecaca;
      }

      /* Waiting Room Overlay (keep existing styles) */
      #waiting-room-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(0, 0, 0, 0.72);
        z-index: 10;
      }

      #waiting-room-overlay.visible {
        display: flex;
      }

      .waiting-room-panel {
        width: min(560px, 100%);
        display: flex;
        flex-direction: column;
        gap: 20px;
        padding: 24px;
        border: 1px solid rgba(126, 207, 255, 0.22);
        border-radius: 18px;
        background: rgba(26, 26, 46, 0.96);
        box-shadow: 0 20px 48px rgba(0, 0, 0, 0.45);
      }

      .overlay-header {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .overlay-title {
        font-size: clamp(1.75rem, 4vw, 2.5rem);
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .overlay-subtitle {
        color: #9aa3b2;
        line-height: 1.5;
      }

      .section-title {
        font-size: 0.82rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #7ecfff;
      }

      .waiting-room-share-hint {
        margin-top: -8px;
        color: #9aa3b2;
        line-height: 1.5;
      }

      .waiting-room-share-row {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .waiting-room-share-input {
        flex: 1;
        min-width: 0;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(126, 207, 255, 0.22);
        background: rgba(16, 16, 29, 0.92);
        color: #f4f6fb;
        font: inherit;
      }

      .waiting-room-share-input:focus {
        outline: 2px solid rgba(126, 207, 255, 0.45);
        outline-offset: 2px;
      }

      .waiting-room-copy-button {
        flex-shrink: 0;
      }

      .waiting-room-share-feedback {
        min-height: 1.25rem;
        font-size: 0.9rem;
        color: #9aa3b2;
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      .waiting-room-share-feedback.visible {
        opacity: 1;
      }

      .waiting-room-share-feedback.success {
        color: #8ff0b0;
      }

      .waiting-room-share-feedback.error {
        color: #fca5a5;
      }

      .waiting-room-player-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .waiting-room-player,
      .waiting-room-empty {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-radius: 14px;
        background: #10101d;
        border: 1px solid rgba(126, 207, 255, 0.1);
      }

      .waiting-room-empty {
        color: #9aa3b2;
      }

      .waiting-room-player-meta {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }

      .waiting-room-player-name {
        font-weight: 600;
      }

      .waiting-room-chip {
        padding: 3px 8px;
        border-radius: 999px;
        background: rgba(126, 207, 255, 0.16);
        color: #d9f3ff;
        font-size: 0.78rem;
      }

      .waiting-room-ready {
        font-size: 0.92rem;
      }

      .waiting-room-ready.ready {
        color: #8ff0b0;
      }

      .waiting-room-ready.not-ready {
        color: #d7dde8;
      }

      .waiting-room-error {
        padding: 14px 16px;
        border-radius: 10px;
        background: rgba(248, 113, 113, 0.12);
        border: 1px solid rgba(248, 113, 113, 0.3);
        color: #fca5a5;
        font-size: 0.92rem;
        line-height: 1.5;
        text-align: center;
      }

      .waiting-room-controls {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        flex-wrap: wrap;
      }

      .lobby-button.is-active {
        background: rgba(143, 240, 176, 0.18);
        border-color: rgba(143, 240, 176, 0.38);
        color: #dcffe6;
      }

      #reconnect-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(10, 10, 26, 0.82);
        backdrop-filter: blur(12px);
        z-index: 30;
      }

      #reconnect-overlay.visible {
        display: flex;
      }

      .reconnect-panel {
        width: min(420px, 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        padding: 32px 28px;
        border-radius: 20px;
        border: 1px solid rgba(124, 58, 237, 0.36);
        background: linear-gradient(180deg, rgba(18, 18, 41, 0.98), rgba(10, 10, 26, 0.98));
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.48);
        text-align: center;
      }

      .reconnect-panel.is-success {
        border-color: rgba(56, 189, 248, 0.38);
      }

      .reconnect-panel.is-error {
        border-color: rgba(248, 113, 113, 0.38);
      }

      .reconnect-badge {
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(124, 58, 237, 0.16);
        color: #c4b5fd;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .reconnect-spinner {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 3px solid rgba(124, 58, 237, 0.18);
        border-top-color: #7c3aed;
        animation: reconnect-spin 0.85s linear infinite;
      }

      .reconnect-title {
        color: #e2e8f0;
        font-size: clamp(1.5rem, 4vw, 2.1rem);
        font-weight: 700;
        line-height: 1.2;
      }

      .reconnect-subtitle {
        max-width: 28ch;
        color: #a1a1aa;
        line-height: 1.6;
      }

      @keyframes reconnect-spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Game Over Overlay */
      .game-over-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(10, 10, 26, 0.85);
        backdrop-filter: blur(12px);
        z-index: 40;
      }

      .game-over-content {
        width: min(460px, 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 40px 32px;
        border-radius: 20px;
        border: 1px solid rgba(124, 58, 237, 0.4);
        background: linear-gradient(180deg, rgba(18, 18, 41, 0.98), rgba(10, 10, 26, 0.98));
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
        text-align: center;
      }

      .game-over-result {
        color: #f4f6fb;
        font-size: clamp(2rem, 5vw, 3rem);
        font-weight: 800;
        line-height: 1.1;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        background: linear-gradient(135deg, #7c3aed, #c4b5fd);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .game-over-message {
        color: #d1d5db;
        font-size: 1.125rem;
        line-height: 1.6;
        max-width: 32ch;
      }

      .game-over-button {
        margin-top: 8px;
        padding: 14px 32px;
        border-radius: 12px;
        border: 1px solid rgba(124, 58, 237, 0.5);
        background: linear-gradient(135deg, #7c3aed, #6d28d9);
        color: #ffffff;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .game-over-button:hover {
        background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        border-color: rgba(167, 139, 250, 0.6);
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(124, 58, 237, 0.3);
      }

      .game-over-button:active {
        transform: translateY(0);
      }

      /* Responsive */
      @media (max-width: 1024px) {
        .lobby-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .lobby-header-inner {
          padding: 0.75rem 1rem;
        }

        .lobby-content {
          padding: 1rem;
        }

        .game-library-header {
          flex-direction: column;
          align-items: flex-start;
        }

        .game-tiles-grid {
          grid-template-columns: 1fr;
        }

        .lobby-header-user span {
          display: none;
        }

        #waiting-room-overlay,
        #reconnect-overlay {
          padding: 16px;
        }

        .waiting-room-panel,
        .reconnect-panel {
          padding: 18px;
        }

        .waiting-room-share-row,
        .waiting-room-controls {
          flex-direction: column;
        }

        .waiting-room-share-input,
        .waiting-room-copy-button,
        .waiting-room-controls .lobby-button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="game-container"></div>
      <div id="lobby-overlay"></div>
      <div id="waiting-room-overlay"></div>
      <div id="reconnect-overlay"></div>
    </div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
